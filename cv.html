<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; min-height:100%; overflow-x:hidden; background:var(--bg); color:var(--text); font-family:'Space Grotesk',sans-serif; }

/* ── CANVAS ── */
#stage { position:fixed; inset:0; z-index:5; pointer-events:none; }
#plant-canvas { width:100%; height:100%; display:block; }

/* ── SCROLL DRIVER ── */
#scroll-driver { position:relative; z-index:1; height:900vh; pointer-events:none; }

/* ── DIMMER ── */
#dimmer {
  position:fixed; inset:0; z-index:2;
  background:rgba(0,0,0,0); pointer-events:none;
  transition:background 0.4s ease;
}
#dimmer.active { background:rgba(0,0,0,0.55); pointer-events:auto; }
[data-theme="light-expressive"] #dimmer.active,
[data-theme="light-minimal"]    #dimmer.active { background:rgba(240,235,228,0.65); }

/* ── CHIP LAYER ── */
#chips {
  position:fixed; inset:0; z-index:10;
  pointer-events:none;
  overflow:visible;  /* FIX: was hidden — clips expanded chips */
}

/* ── CHIP ── */
.chip {
  position:absolute;
  pointer-events:auto;
  cursor:pointer;
  /* FIX: start invisible but no translateX so no jump */
  opacity:0;
transition: 
    opacity 0.5s ease,
    width 0.45s cubic-bezier(0.34,1.1,0.64,1),
    filter 0.35s ease,
    background 0.3s ease,
    border-color 0.3s ease,
    box-shadow 0.3s ease,
    transform 0.2s ease; /* Add transform for the lift effect */

  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 14px;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.28),
    inset 0 1px 0 rgba(255,255,255,0.20),
    inset 0 -1px 0 rgba(0,0,0,0.10);

  width: 250px;
  padding: 10px 14px;
  overflow: hidden;
}
/* Hover State */
.chip:hover:not(.expanded) {
  transform: translateY(-4px); /* Lift the chip slightly */
  background: rgba(255, 255, 255, 0.15); /* Slightly brighter background */
  border-color: rgba(255, 255, 255, 0.3); /* Brighter border */
  box-shadow: 
    0 8px 30px rgba(0,0,0,0.4), 
    inset 0 1px 0 rgba(255,255,255,0.25); /* Stronger shadow */
}
.chip.visible { opacity:1; }
.chip.dimmed  { filter:brightness(0.3) blur(1.5px); pointer-events:none; }

.chip.expanded {
  width: 300px;
  z-index: 20;
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.24);
  box-shadow:
    0 8px 40px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.28),
    inset 0 -1px 0 rgba(0,0,0,0.12),
    0 0 0 1px rgba(255,255,255,0.05);
  cursor: default;
}
/* Dimmer adjustment for Light Themes */
[data-theme="light-expressive"] #dimmer.active,
[data-theme="light-minimal"] #dimmer.active { 
  background: rgba(240, 235, 228, 0.7); /* Lighter backdrop for light theme */
}

/* Ensure chips remain legible when dimmed in Light Mode */
[data-theme^="light"] .chip.dimmed {
  filter: brightness(0.9) blur(1px); /* Less aggressive dimming for light mode */
  opacity: 0.6;
}

/* Explicitly handle the 'expanded' state for Light Themes if needed */
[data-theme^="light"] .chip.expanded {
  background: rgba(255, 255, 255, 0.95);
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}
[data-theme="light-expressive"] .chip,
[data-theme="light-minimal"]    .chip {
  background: rgba(255,255,255,0.5);
  border-color: rgba(0,0,0,0.10);
  box-shadow: 0 4px 24px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.85);
}
[data-theme="light-expressive"] .chip.expanded,
[data-theme="light-minimal"]    .chip.expanded {
  background: rgba(255,255,255,0.78);
  border-color: rgba(0,0,0,0.14);
}

/* ── CHIP HEADER ── */
/* Update Header structure */
.chip-header {
  display: flex;
  align-items: flex-start; /* Align top so title stays put if meta stacks */
  gap: 8px;
}

.chip-title  { font-size:13px; font-weight:500; color:var(--text); line-height:1.3; flex:1; min-width:0; }
.chip-year   { font-family:'Space Mono',monospace; font-size:9px; color:var(--accent); letter-spacing:0.1em; white-space:nowrap; flex-shrink:0; }
.chip-expand-icon {
  font-size:12px; color:var(--dim); margin-left:2px; flex-shrink:0;
  transition:transform 0.3s ease, color 0.2s;
  display:inline-block;
}
.chip.expanded .chip-expand-icon { transform:rotate(45deg); color:var(--muted); }

/* ── CHIP BODY ── */
.chip-body {
  max-height:0; overflow:hidden; opacity:0;
  transition: max-height 0.45s cubic-bezier(0.34,1.1,0.64,1), opacity 0.3s ease;
}
.chip.expanded .chip-body { max-height:500px; opacity:1; }

.chip-org   { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.06em; margin:7px 0 5px; }
.chip-desc  { font-size:12px; color:var(--muted); line-height:1.65; margin-bottom:8px; }
.chip-tags  { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:6px; }
.chip-tag   {
  font-family:'Space Mono',monospace; font-size:9px; padding:2px 7px; border-radius:3px;
  background:rgba(126,190,154,0.10); color:var(--accent); border:0.5px solid rgba(126,190,154,0.22);
}
.chip-tag.purple { background:rgba(167,139,250,0.10); color:var(--accent2); border-color:rgba(167,139,250,0.22); }
.chip-tag.amber  { background:rgba(246,173,85,0.10);  color:var(--accent3); border-color:rgba(246,173,85,0.22); }
.chip-pub {
  display:block; font-family:'Space Mono',monospace; font-size:10px;
  color:var(--accent3); text-decoration:none; opacity:0.85; margin-top:4px;
  transition:opacity 0.15s;
}
.chip-pub:hover { opacity:1; }
.chip-close {
  display:inline-block; margin-top:10px; font-family:'Space Mono',monospace;
  font-size:9px; color:var(--dim); letter-spacing:0.06em; cursor:pointer; transition:color 0.2s;
}
.chip-close:hover { color:var(--muted); }

.chip-title-container { flex: 1; min-width: 0; }

.chip-meta {
  display: flex;
  flex-direction: column; /* This stacks them vertically */
  align-items: flex-end;  /* This right-aligns both */
  gap: 4px;               /* Space between year and badge */
  flex-shrink: 0;
}

/* Badge styling */
.chip-pub-badge {
  background: var(--accent3);
  color: #000;
  font-family: 'Space Mono', monospace;
  font-size: 7px;
  padding: 1px 4px;
  border-radius: 3px;
  text-transform: uppercase;
  font-weight: bold;
  white-space: nowrap;
}
/* ── CAREER RULER ── */
#career-ruler {
  position:fixed; left:clamp(14px,3vw,42px); top:8vh;
  width:112px; height:84vh; z-index:9; pointer-events:none; opacity:0.95;
  transition:filter 0.35s ease;
}
#career-ruler.dimmed { filter:brightness(0.25) blur(1px); }
.ruler-line {
  position:absolute; left:54px; top:0; bottom:0;
  width:2px; border-radius:999px; background:rgba(255,255,255,0.08); overflow:hidden;
}
.ruler-progress { position:absolute; inset:0; clip-path:inset(100% 0 0 0); transition:clip-path 0.08s linear; }
.ruler-segment  { position:absolute; left:0; width:100%; border-radius:999px; }
.ruler-segment.mit   { background:#7ebe9a; }
.ruler-segment.weill { background:#f6ad55; }
.ruler-segment.bms   { background:#a78bfa; }
.ruler-tick         { position:absolute; left:43px; width:11px; height:1px; background:var(--dim); transform:translateY(-0.5px); }
.ruler-tick.quarter { width:8px;  left:46px; opacity:0.55; }
.ruler-tick.half    { width:14px; left:40px; opacity:0.75; }
.ruler-tick.major   { left:30px;  width:24px; background:var(--muted); }
.ruler-year {
  position:absolute; left:0; width:26px; transform:translateY(-50%);
  color:var(--muted); font-family:'Space Mono',monospace; font-size:9px; line-height:1; text-align:right;
}
.ruler-node {
  position:absolute; left:48px; width:14px; height:14px;
  border:2px solid var(--bg); border-radius:50%; transform:translateY(-50%);
  box-shadow:0 0 0 1px rgba(255,255,255,0.18), 0 0 12px currentColor;
}
.ruler-node.mit   { color:#7ebe9a; background:#7ebe9a; }
.ruler-node.weill { color:#f6ad55; background:#f6ad55; }
.ruler-node.bms   { color:#a78bfa; background:#a78bfa; }
.ruler-node.now   { width:16px; height:16px; left:47px; }
.ruler-place {
  position:absolute; left:70px; transform:translateY(-50%);
  font-family:'Space Mono',monospace; font-size:9px; line-height:1.2; letter-spacing:0.04em; white-space:nowrap;
}
.ruler-place.mit   { color:#7ebe9a; }
.ruler-place.weill { color:#f6ad55; }
.ruler-place.bms   { color:#a78bfa; }

/* ── NAV (inline — no nav.js dependency) ── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; justify-content:space-between; align-items:center;
  padding:1rem 3rem;
  border-bottom:0.5px solid var(--border);
  background:rgba(10,12,15,0.75);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
[data-theme="light-expressive"] nav,
[data-theme="light-minimal"]    nav { background:rgba(250,250,248,0.82); }

.nav-brand { display:flex; align-items:center; gap:10px; }
.nav-logo  { font-family:'Space Mono',monospace; font-size:13px; color:var(--accent); text-decoration:none; letter-spacing:0.06em; }
.nav-divider { color:var(--dim); font-family:'Space Mono',monospace; font-size:13px; }
.nav-wander  { font-family:'Space Mono',monospace; font-size:13px; color:var(--muted); text-decoration:none; letter-spacing:0.06em; transition:color 0.2s; }
.nav-wander:hover { color:var(--text); }
.nav-back  { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); text-decoration:none; letter-spacing:0.06em; transition:color 0.2s; }
.nav-back:hover { color:var(--text); }
.nav-right { display:flex; align-items:center; gap:1.5rem; }

/* theme switcher */
.theme-switcher { position:relative; }
.theme-btn {
  display:flex; align-items:center; gap:6px; padding:5px 10px; border-radius:6px;
  border:0.5px solid var(--border2); background:transparent; color:var(--muted);
  font-family:'Space Mono',monospace; font-size:10px; letter-spacing:0.06em; cursor:pointer; transition:all 0.2s;
}
.theme-btn:hover { color:var(--text); border-color:var(--dim); }
.theme-btn-dots { display:grid; grid-template-columns:1fr 1fr; gap:2px; width:14px; height:14px; }
.theme-btn-dots span { border-radius:1px; display:block; }
.theme-panel {
  position:absolute; top:calc(100% + 10px); right:0;
  background:var(--bg2); border:0.5px solid var(--border2); border-radius:10px;
  padding:10px; display:none; z-index:200; min-width:200px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.theme-panel.open { display:block; }
.theme-panel-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:0.1em; text-transform:uppercase; padding:2px 4px 8px; }
.theme-axis { display:flex; justify-content:space-between; padding:6px 2px 2px; font-family:'Space Mono',monospace; font-size:8px; color:var(--dim); }
.theme-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.theme-option { border:0.5px solid var(--border2); border-radius:7px; padding:10px; cursor:pointer; transition:all 0.15s; background:transparent; text-align:left; }
.theme-option:hover { border-color:var(--accent); }
.theme-option.active { border-color:var(--accent); background:rgba(126,190,154,0.06); }
.theme-swatch { width:100%; height:28px; border-radius:4px; margin-bottom:7px; border:0.5px solid rgba(0,0,0,0.1); }
.swatch-de { background:linear-gradient(135deg,#0a0c0f 50%,#7ebe9a 150%); }
.swatch-le { background:linear-gradient(135deg,#f0ece4 50%,#0891b2 150%); }
.swatch-dm { background:linear-gradient(135deg,#0c0c0c 50%,#333 150%); }
.swatch-lm { background:linear-gradient(135deg,#ffffff 50%,#aaa 150%); }
.theme-name { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }
.theme-name strong { display:block; color:var(--text); font-size:10px; margin-bottom:1px; }

/* ── PROGRESS BAR ── */
#progress-bar { position:fixed; bottom:0; left:0; height:2px; background:var(--accent); z-index:100; width:0%; transition:width 0.1s linear; box-shadow:0 0 8px var(--accent); }

/* ── SCROLL HINT ── */
#scroll-hint {
  position:fixed; bottom:32px; left:50%; transform:translateX(-50%);
  font-family:'Space Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:0.1em;
  z-index:20; display:flex; flex-direction:column; align-items:center; gap:6px; transition:opacity 0.4s ease;
}
#scroll-hint.hidden { opacity:0; pointer-events:none; }
.scroll-arrow { width:1px; height:28px; background:linear-gradient(to bottom,transparent,var(--dim)); animation:arrowPulse 1.8s ease-in-out infinite; }
@keyframes arrowPulse { 0%,100%{opacity:0.3;transform:scaleY(0.7);}50%{opacity:1;transform:scaleY(1);} }

@media (max-width:720px) {
  #career-ruler { left:8px; width:66px; opacity:0.8; }
  .ruler-line { left:40px; } .ruler-tick { left:31px; width:9px; }
  .ruler-tick.quarter { left:34px; width:6px; } .ruler-tick.half { left:29px; width:11px; }
  .ruler-tick.major { left:23px; width:17px; } .ruler-year { width:22px; font-size:8px; }
  .ruler-node { left:35px; width:11px; height:11px; } .ruler-node.now { left:34px; width:13px; height:13px; }
  .ruler-place { display:none; }
  .chip { width:180px; } .chip.expanded { width:230px; }
  nav { padding:0.75rem 1rem; }
}
</style>

<script>
/* ══════════════════════════════════════════
   THEME — runs immediately, DOM already has themeBtn
══════════════════════════════════════════ */
var currentTheme = localStorage.getItem('bl-theme') || 'dark-expressive';
document.body.setAttribute('data-theme', currentTheme);
var bgDirty = true;

function setTheme(theme, optionEl) {
  currentTheme = theme;
  document.body.setAttribute('data-theme', theme);
  localStorage.setItem('bl-theme', theme);
  document.querySelectorAll('.theme-option').forEach(el =>
    el.classList.toggle('active', el.getAttribute('data-theme') === theme));
  closePanel();
  bgDirty = true;
}
function togglePanel() { document.getElementById('themePanel').classList.toggle('open'); }
function closePanel()  { document.getElementById('themePanel').classList.remove('open'); }

document.getElementById('themeBtn').addEventListener('click', e => { e.stopPropagation(); togglePanel(); });
document.addEventListener('click', e => { if (!e.target.closest('.theme-switcher')) closePanel(); });

// restore theme on load
if (currentTheme !== 'dark-expressive') {
  document.querySelectorAll('.theme-option').forEach(el =>
    el.classList.toggle('active', el.getAttribute('data-theme') === currentTheme));
}

/* ══════════════════════════════════════════
   CANVAS
══════════════════════════════════════════ */
const canvas = document.getElementById('plant-canvas');
const ctx    = canvas.getContext('2d');
let W, H;

// FIX: declare all DOM refs before any function uses them
const chipsDiv    = document.getElementById('chips');
const dimmerEl    = document.getElementById('dimmer');
const rulerEl     = document.getElementById('career-ruler');
const driver      = document.getElementById('scroll-driver');
const progressBar = document.getElementById('progress-bar');
const scrollHint  = document.getElementById('scroll-hint');

let STEM = [], NODES = [], chipEls = {}, openChip = null;
let progress = 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = window.innerWidth;
  const h = window.innerHeight;

  // 1. Set the physical buffer size (the "memory" size)
  canvas.width = w * dpr;
  canvas.height = h * dpr;

  // 2. Set the display size (the "CSS" size)
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';

  // 3. Reset the context scale
  // This is the "magic" step: it forces 1 unit in your code
  // to equal 1 physical pixel on the high-res screen.
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);

  W = w;
  H = h;
  
  // Re-initialize layouts
  buildPlantDefs();
  buildCareerRuler();
  positionChips();
  
  bgDirty = true;
}
window.addEventListener('resize', resize);

/* ══════════════════════════════════════════
   CSS VARS
══════════════════════════════════════════ */
function themeColors() {
  const s = getComputedStyle(document.body);
  const g = n => s.getPropertyValue(n).trim();
  return {
    bg:      g('--bg')      || '#0a0c0f',
    accent:  g('--accent')  || '#7ebe9a',
    accent2: g('--accent2') || '#a78bfa',
    accent3: g('--accent3') || '#f6ad55',
    text:    g('--text')    || '#e8edf5',
    muted:   g('--muted')   || '#6b7890',
  };
}

/* ══════════════════════════════════════════
   MILESTONES
══════════════════════════════════════════ */
const MILESTONES = [

  { id:'leslie',   p:0.50, side:'left',  year:'2020 — 2021',

/* ══════════════════════════════════════════
   STEM GEOMETRY
══════════════════════════════════════════ */
function stemPoint(t) {
  if (!W || !H) return { x:0, y:0 };
  const x0=W*0.42,y0=H*0.92, cx1=W*0.35,cy1=H*0.65, cx2=W*0.55,cy2=H*0.35, x3=W*0.50,y3=H*0.08;
  const mt=1-t;
  return { x:mt*mt*mt*x0+3*mt*mt*t*cx1+3*mt*t*t*cx2+t*t*t*x3, y:mt*mt*mt*y0+3*mt*mt*t*cy1+3*mt*t*t*cy2+t*t*t*y3 };
}
function stemTangent(t) {
  if (!W || !H) return { x:1, y:0 };
  const x0=W*0.42,y0=H*0.92, cx1=W*0.35,cy1=H*0.65, cx2=W*0.55,cy2=H*0.35, x3=W*0.50,y3=H*0.08;
  const mt=1-t;
  return { x:3*(mt*mt*(cx1-x0)+2*mt*t*(cx2-cx1)+t*t*(x3-cx2)), y:3*(mt*mt*(cy1-y0)+2*mt*t*(cy2-cy1)+t*t*(y3-cy2)) };
}

function buildPlantDefs() {
  STEM = [];
  const segments = 600;
  for (let i=0;i<=segments;i++) STEM.push(stemPoint(i/segments));
  NODES = MILESTONES.map(m => {
    const pt=stemPoint(m.p), tan=stemTangent(m.p);
    const len=Math.max(0.001, Math.sqrt(tan.x*tan.x+tan.y*tan.y));
    return { ...m, pt, nx:-tan.y/len, ny:tan.x/len, tan };
  });
}

/* ══════════════════════════════════════════
   CHIPS
══════════════════════════════════════════ */
function buildChips() {
  chipsDiv.innerHTML = '';
  chipEls = {};
  NODES.forEach(n => {
    const el = document.createElement('div');
    el.className = `chip ${n.side}`;
    el.id = `chip-${n.id}`;
    el.innerHTML = chipHTML(n);
    chipsDiv.appendChild(el);
    chipEls[n.id] = el;
    el.querySelector('.chip-header').addEventListener('click', () => toggleChip(n.id));
    const cb = el.querySelector('.chip-close');
    if (cb) cb.addEventListener('click', e => { e.stopPropagation(); closeAllChips(); });
  });
  dimmerEl.addEventListener('click', closeAllChips);
}

function chipHTML(n) {
  const org = n.org ? `<div class="chip-org">${n.org}</div>` : '';
  const pub = n.pub ? `<a class="chip-pub" href="${n.pub.href}" target="_blank" rel="noopener">↗ ${n.pub.text}</a>` : '';
  // Only map the existing tags. Do NOT add the pub-indicator here anymore.
  const tagList = (n.tags || []).map(([t, c]) => `<span class="chip-tag ${c}">${t}</span>`).join('');
  const tagsContainer = tagList ? `<div class="chip-tags">${tagList}</div>` : '';
  // Header meta (Year + Badge)
  const pubBadge = n.pub ? `<span class="chip-pub-badge">● PUB</span>` : '';
  const metaContainer = (n.year || pubBadge) 
    ? `<div class="chip-meta">${n.year ? `<span class="chip-year">${n.year}</span>` : ''}${pubBadge}</div>` 
    : '';
  return `
    <div class="chip-header">
      <div class="chip-title-container">
        <span class="chip-title">${n.title}</span>
      </div>
      ${metaContainer}
      <span class="chip-expand-icon">+</span>
    </div>
    <div class="chip-body">${org}<div class="chip-desc">${n.desc}</div>${tagsContainer}${pub}<span class="chip-close">close ×</span></div>`;
}

function toggleChip(id) {
  if (openChip === id) { closeAllChips(); return; }
  // Close others
  Object.values(chipEls).forEach(el => el.classList.remove('expanded', 'dimmed'));
  openChip = id;
  chipEls[id].classList.add('expanded');
  // Apply dimming
  Object.entries(chipEls).forEach(([k,v]) => { 
    if (k !== id) v.classList.add('dimmed'); 
  });
  dimmerEl.classList.add('active');
  rulerEl.classList.add('dimmed');
  // Optional: If you want to force a specific color based on the current theme
  const isLight = document.body.getAttribute('data-theme').startsWith('light');
  dimmerEl.style.background = isLight ? 'rgba(240, 235, 228, 0.7)' : 'rgba(0,0,0,0.55)';
}

function closeAllChips() {
  Object.values(chipEls).forEach(el => el.classList.remove('expanded', 'dimmed'));
  openChip = null;
  dimmerEl.classList.remove('active');
  rulerEl.classList.remove('dimmed');
}

function positionChips() {
  if (!NODES.length) return;
  const OFFSET = 50;
  NODES.forEach(n => {
    const el = chipEls[n.id];
    if (!el || !n.pt) return;
    if (n.side === 'right') {
      el.style.left  = (n.pt.x + OFFSET) + 'px';
      el.style.right = 'auto';
    } else {
      el.style.right = (W - n.pt.x + OFFSET) + 'px';
      el.style.left  = 'auto';
    }
    el.style.top = (n.pt.y - 22) + 'px';
  });
}

/* ══════════════════════════════════════════
   CAREER RULER
══════════════════════════════════════════ */
const careerStartYear   = 2015;
const careerCurrentYear = new Date().getFullYear();
const careerSegments = [
  { id:'mit',   label:'MIT',           start:2015.75, end:2019.75 },
  { id:'weill', label:'Weill Cornell', start:2019.75, end:2021.5 },
  { id:'bms',   label:'BMS',           start:2021.5, end:careerCurrentYear },
];
function careerYearPct(year) {
  return ((careerCurrentYear - year) / Math.max(1, careerCurrentYear - careerStartYear)) * 100;
}

function buildCareerRuler() {
  if (!rulerEl || !W || !H) return;
  const stemTop    = stemPoint(1).y;
  const stemBottom = stemPoint(0).y;
  rulerEl.style.top    = stemTop + 'px';
  rulerEl.style.height = (stemBottom - stemTop) + 'px';

  let html = '<div class="ruler-line"><div class="ruler-progress">';
  careerSegments.forEach(seg => {
    const top=careerYearPct(seg.end), bot=careerYearPct(seg.start);
    html += `<span class="ruler-segment ${seg.id}" style="top:${top}%;height:${bot-top}%;"></span>`;
  });
  html += '</div></div>';

  for (let q=careerStartYear*4; q<=careerCurrentYear*4; q++) {
    const val=q/4, top=careerYearPct(val);
    const cls = q%4===0?'major':q%2===0?'half':'quarter';
    html += `<span class="ruler-tick ${cls}" style="top:${top}%;"></span>`;
    if (q%4===0) html += `<span class="ruler-year" style="top:${top}%;">${Math.round(val)}</span>`;
  }
  [{year:2015.75,cls:'mit'},{year:2019.75,cls:'weill'},{year:2021.5,cls:'bms'},{year:careerCurrentYear,cls:'bms now'}]
    .forEach(n => html+=`<span class="ruler-node ${n.cls}" style="top:${careerYearPct(n.year)}%;"></span>`);
  careerSegments.forEach(seg => {
    const mid=(careerYearPct(seg.start)+careerYearPct(seg.end))/2;
    html+=`<span class="ruler-place ${seg.id}" style="top:${mid}%;">${seg.label}</span>`;
  });
  rulerEl.innerHTML = html;
}

/* ══════════════════════════════════════════
   DRAW
══════════════════════════════════════════ */
function getThickness(t) { return 1.5 + Math.min(t/0.66,1)*2.8; }
function stemColor(c,t,isDark) {
  if (isDark) { const g=Math.round(150+t*60),rb=Math.round(40+t*30); return `rgba(${rb},${g},${Math.round(rb*1.2)},0.92)`; }
  return `rgba(30,${Math.round(120+t*80)},60,0.88)`;
}

function draw(p) {
  if (!W || !H) return;
  const c=themeColors(), isDark=currentTheme.startsWith('dark');
  ctx.clearRect(0,0,W,H);

  const bg=ctx.createLinearGradient(0,H,0,0);
  if (isDark) { bg.addColorStop(0,'#050708'); bg.addColorStop(0.3,'#080c10'); bg.addColorStop(1,'#0a0c14'); }
  else        { bg.addColorStop(0,'#e8e2d8'); bg.addColorStop(0.3,'#f0ece4'); bg.addColorStop(1,'#fafaf8'); }
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  // soil
  ctx.fillStyle=isDark?'#1a1208':'#c8b898';
  ctx.beginPath(); ctx.ellipse(W*0.42,H*0.94,W*0.18,H*0.04,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=isDark?'rgba(80,55,20,0.4)':'rgba(100,75,40,0.3)'; ctx.lineWidth=1;
  for (let i=0;i<5;i++) {
    const ox=(i-2)*18;
    ctx.beginPath(); ctx.moveTo(W*0.42+ox,H*0.93);
    ctx.bezierCurveTo(W*0.42+ox-4,H*0.945,W*0.42+ox+4,H*0.955,W*0.42+ox,H*0.965); ctx.stroke();
  }

  const stemP=Math.min(1,p*1.5), stemLen=Math.floor(stemP*STEM.length);

  if (stemLen>1) {
    ctx.save(); ctx.lineWidth=getThickness(0)*2.5; ctx.strokeStyle=c.accent+'18';
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.filter='blur(6px)';
    ctx.beginPath(); ctx.moveTo(STEM[0].x,STEM[0].y);
    for (let i=1;i<stemLen;i++) ctx.lineTo(STEM[i].x,STEM[i].y);
    ctx.stroke(); ctx.filter='none'; ctx.restore();

    ctx.lineCap='round'; ctx.lineJoin='round';
    for (let i=1;i<stemLen;i++) {
      const t=i/STEM.length;
      ctx.lineWidth=getThickness(t); ctx.strokeStyle=stemColor(c,t,isDark);
      ctx.beginPath(); ctx.moveTo(STEM[i-1].x,STEM[i-1].y); ctx.lineTo(STEM[i].x,STEM[i].y); ctx.stroke();
    }
    const tip=STEM[stemLen-1];
    ctx.save(); ctx.shadowColor=c.accent; ctx.shadowBlur=12; ctx.fillStyle=c.accent;
    ctx.beginPath(); ctx.arc(tip.x,tip.y,3,0,Math.PI*2); ctx.fill(); ctx.restore();
  }

  // seed
  const sx=W*0.42, sy=H*0.90;
  if (p<0.005) {
    ctx.save(); ctx.fillStyle=c.accent+'cc'; ctx.strokeStyle=c.accent; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(sx,sy,6,8,0.3,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();
  } else {
    const lp=Math.min(1,p*8);
    ctx.save(); ctx.strokeStyle=c.accent;
    ctx.fillStyle=c.accent+Math.round(lp*220).toString(16).padStart(2,'0');
    ctx.save(); ctx.translate(sx-2,sy-2); ctx.rotate(-0.5); ctx.scale(lp,lp);
    ctx.beginPath(); ctx.ellipse(-6,0,8,4,-0.3,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();
    ctx.save(); ctx.translate(sx+2,sy-2); ctx.rotate(0.5); ctx.scale(lp,lp);
    ctx.beginPath(); ctx.ellipse(6,0,8,4,0.3,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();
    ctx.restore();
  }

  // nodes
  NODES.forEach(n => {
  // A chip appears when the stem reaches its specific p value
    // We use a small buffer (e.g., 0.02) so it appears just as the stem reaches it
    if (stemP < (n.p - 0.02)) return; 
    // Calculate visibility based on how far the stem has passed this node
    const localP = Math.min(1, (stemP - n.p) / 0.15); 
    if (localP <= 0) return; // Haven't reached it yet

    // dot
    ctx.save();
    const dotR=n.type==='joint'?5:3.5;
    ctx.shadowColor=n.type==='joint'?c.accent:c.accent+'88';
    ctx.shadowBlur=n.type==='joint'?10:6;
    ctx.fillStyle=c.accent; ctx.strokeStyle=isDark?'#0a0c0f':'#fafaf8'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(n.pt.x,n.pt.y,dotR*localP,0,Math.PI*2); ctx.fill(); ctx.stroke(); ctx.restore();

    // connector
    const ex=n.pt.x+(n.side==='right'?44:-44);
    ctx.save(); ctx.globalAlpha=localP*0.45; ctx.strokeStyle=c.accent; ctx.lineWidth=0.8;
    ctx.setLineDash([3,4]); ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(n.pt.x,n.pt.y); ctx.lineTo(ex,n.pt.y); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();

    // leaf
    if (n.type==='leaf'||n.type==='branch') {
      const dir=n.side==='right'?1:-1, lw=n.type==='branch'?38:28, lh=n.type==='branch'?16:11;
      ctx.save(); ctx.translate(n.pt.x+dir*14*localP, n.pt.y-6*localP);
      ctx.rotate(n.side==='right'?-0.4:0.4); ctx.scale(localP,localP);
      ctx.fillStyle=c.accent+'55'; ctx.strokeStyle=c.accent; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.moveTo(0,0);
      ctx.quadraticCurveTo(dir*lw*0.5,-lh*1.2,dir*lw,0);
      ctx.quadraticCurveTo(dir*lw*0.5,lh*0.8,0,0); ctx.fill(); ctx.stroke();
      ctx.strokeStyle=c.accent+'aa'; ctx.lineWidth=0.6;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(dir*lw*0.85,0); ctx.stroke();
      for (let i=1;i<=3;i++) { const vx=dir*lw*i*0.22; ctx.beginPath(); ctx.moveTo(vx,0); ctx.lineTo(vx+dir*6,-lh*0.55); ctx.stroke(); }
      ctx.restore();
    }

    // joint ring
    if (n.type==='joint') {
      ctx.save(); ctx.globalAlpha=localP*0.22; ctx.strokeStyle=c.accent; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(n.pt.x,n.pt.y,12*localP,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=localP*0.08; ctx.beginPath(); ctx.arc(n.pt.x,n.pt.y,20*localP,0,Math.PI*2); ctx.stroke(); ctx.restore();
    }

    // chip visibility
    const el=chipEls[n.id];
    if (el) {
      if (localP>0.3) el.classList.add('visible');
      else            el.classList.remove('visible');
    }
  });
}

/* ══════════════════════════════════════════
   SCROLL
══════════════════════════════════════════ */
function onScroll() {
  // console.log("scroll", window.scrollY);
  const scrollTop=window.scrollY||0;
  const maxScroll=Math.max(1, driver.offsetHeight - window.innerHeight);
  progress=Math.max(0,Math.min(1,scrollTop/maxScroll));
  progressBar.style.width=(progress*100)+'%';

  const rp=document.querySelector('.ruler-progress');
  if (rp) rp.style.clipPath=`inset(${100-Math.min(1,progress*1.5)*100}% 0 0 0)`;

  if (progress>0.03) scrollHint.classList.add('hidden');
  else               scrollHint.classList.remove('hidden');

  draw(progress);
}
window.addEventListener('scroll', onScroll, { passive:true });

/* ══════════════════════════════════════════
   INIT — single entry point, load event only
══════════════════════════════════════════ */
function tick() { if (bgDirty) { draw(progress); bgDirty=false; } requestAnimationFrame(tick); }

window.addEventListener('load', () => {
  resize();

  buildChips();         // FIX: called exactly once
  positionChips();
  window.scrollTo(0,0);
  progress=0;
  draw(0);
  requestAnimationFrame(tick);
  onScroll();
});
</script>
