<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  overflow-x: hidden;
}

/* ── FIXED CANVAS VIEWPORT ── */
#stage {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
#plant-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── SCROLL DRIVER ── */
#scroll-driver {
  position: relative;
  z-index: 1;
  /* height = how many vh of scrolling the full animation takes */
  height: 900vh;
  pointer-events: none;
}

/* ── LABEL LAYER ── */
#labels {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
  overflow: hidden;
}

/* ── INSTITUTION RULER ── */
#career-ruler {
  position: fixed;
  left: clamp(14px, 3vw, 42px);
  top: 8vh;
  width: 112px;
  height: 84vh;
  z-index: 9;
  pointer-events: none;
  opacity: 0.95;
}
.ruler-line {
  position: absolute;
  left: 54px;
  top: 0;
  bottom: 0;
  width: 2px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}
.ruler-progress {
  position: absolute;
  inset: 0;
  clip-path: inset(100% 0 0 0);
  transition: clip-path 0.08s linear;
}
.ruler-segment {
  position: absolute;
  left: 0;
  width: 100%;
  border-radius: 999px;
}
.ruler-segment.mit { background: #7ebe9a; }
.ruler-segment.weill { background: #a78bfa; }
.ruler-segment.bms { background: #f6ad55; }
.ruler-tick {
  position: absolute;
  left: 43px;
  width: 11px;
  height: 1px;
  background: var(--dim);
  transform: translateY(-0.5px);
}
.ruler-tick.quarter { width: 8px; left: 46px; opacity: 0.55; }
.ruler-tick.half { width: 14px; left: 40px; opacity: 0.75; }
.ruler-tick.major {
  left: 30px;
  width: 24px;
  background: var(--muted);
}
.ruler-year {
  position: absolute;
  left: 0;
  width: 26px;
  transform: translateY(-50%);
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  line-height: 1;
  text-align: right;
  letter-spacing: 0;
}
.ruler-node {
  position: absolute;
  left: 48px;
  width: 14px;
  height: 14px;
  border: 2px solid var(--bg);
  border-radius: 50%;
  transform: translateY(-50%);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.18), 0 0 12px currentColor;
}
.ruler-node.mit { color: #7ebe9a; background: #7ebe9a; }
.ruler-node.weill { color: #f6ad55; background: #f6ad55; }
.ruler-node.bms { color: #a78bfa; background: #a78bfa; }
.ruler-node.now {
  width: 16px;
  height: 16px;
  left: 47px;
}
.ruler-place {
  position: absolute;
  left: 70px;
  transform: translateY(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  line-height: 1.2;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.ruler-place.mit { color: #7ebe9a; }
.ruler-place.weill { color: #a78bfa; }
.ruler-place.bms { color: #f6ad55; }

.label {
  position: absolute;
  pointer-events: auto;
  opacity: 0;
  transform: translateX(-12px);
  transition: opacity 0.55s ease, transform 0.55s ease;
  max-width: 280px;
}
.label.right {
  transform: translateX(12px);
}
.label.visible {
  opacity: 1;
  transform: translateX(0);
}

.label-year {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 0.12em;
  margin-bottom: 3px;
}
.label-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 2px;
}
.label-org {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.label-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}
.label-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}
.label-tag {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 3px;
  background: rgba(126,190,154,0.08);
  color: var(--accent);
  border: 0.5px solid rgba(126,190,154,0.2);
}
.label-tag.purple {
  background: rgba(167,139,250,0.08);
  color: var(--accent2);
  border-color: rgba(167,139,250,0.2);
}
.label-tag.amber {
  background: rgba(246,173,85,0.08);
  color: var(--accent3);
  border-color: rgba(246,173,85,0.2);
}

/* pub link inside label */
.label-pub {
  display: block;
  margin-top: 7px;
  font-size: 11px;
  color: var(--accent3);
  text-decoration: none;
  font-family: 'Space Mono', monospace;
  letter-spacing: 0.04em;
  opacity: 0.85;
  transition: opacity 0.15s;
}
.label-pub:hover { opacity: 1; }

/* ── CV PAGE LAYOUT ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
}

/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed;
  bottom: 0; left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 100;
  width: 0%;
  transition: width 0.1s linear;
  box-shadow: 0 0 8px var(--accent);
}

/* ── SCROLL HINT ── */
#scroll-hint {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.1em;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: opacity 0.4s ease;
}
#scroll-hint.hidden { opacity: 0; }
.scroll-arrow {
  width: 1px;
  height: 28px;
  background: linear-gradient(to bottom, transparent, var(--dim));
  animation: arrowPulse 1.8s ease-in-out infinite;
}
@keyframes arrowPulse {
  0%, 100% { opacity: 0.3; transform: scaleY(0.7); }
  50%       { opacity: 1;   transform: scaleY(1); }
}

/* ── DONE STATE ── */
#done-cta {
  position: fixed;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  opacity: 0;
  transition: opacity 0.6s ease;
  pointer-events: none;
  text-align: center;
}
#done-cta.visible {
  opacity: 1;
  pointer-events: auto;
}
#done-cta a {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  border: 0.5px solid rgba(126,190,154,0.4);
  background: rgba(126,190,154,0.06);
  padding: 8px 20px;
  border-radius: 6px;
  text-decoration: none;
  letter-spacing: 0.06em;
  transition: all 0.2s;
}
#done-cta a:hover {
  background: rgba(126,190,154,0.12);
  border-color: var(--accent);
}

@media (max-width: 720px) {
  #career-ruler {
    left: 8px;
    width: 66px;
    opacity: 0.8;
  }
  .ruler-line { left: 40px; }
  .ruler-tick { left: 31px; width: 9px; }
  .ruler-tick.quarter { left: 34px; width: 6px; }
  .ruler-tick.half { left: 29px; width: 11px; }
  .ruler-tick.major { left: 23px; width: 17px; }
  .ruler-year {
    width: 22px;
    font-size: 8px;
  }
  .ruler-node { left: 35px; width: 11px; height: 11px; }
  .ruler-node.now { left: 34px; width: 13px; height: 13px; }
  .ruler-place { display: none; }
  .label { max-width: 210px; }
}

</style>

<script>

    el.classList.toggle('active', el.getAttribute('data-theme') === theme);

  closePanel();
  bgDirty = true;
}

function togglePanel() {
  document.getElementById('themePanel').classList.toggle('open');
}
function closePanel() {
  document.getElementById('themePanel').classList.remove('open');
}

document.getElementById('themeBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  togglePanel();
});
document.addEventListener('click', function(e) {

if (currentTheme !== 'dark-expressive') {

/* ══════════════════════════════════════════
   CANVAS SETUP
══════════════════════════════════════════ */
const canvas = document.getElementById('plant-canvas');
const ctx    = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  bgDirty = true;

  buildCareerRuler();

}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */

    accent2: cssVar('--accent2') || '#a78bfa',

/* ══════════════════════════════════════════

   Progress 0→1 maps to the full scroll height.
   Each milestone has a `p` (progress threshold),

══════════════════════════════════════════ */

// Stem runs from bottom center upward.

// computed relative to W, H.

let STEM = [];   // array of {x,y} world points built from bezier
let NODES = [];  // milestone nodes on/near stem
let bgDirty = true;

const MILESTONES = [
  // {

  //   side: 'right',
  //   year: '2015 — 2019',
  //   title: 'S.B. Mathematics with Computer Science',

  //   tags: [['Pure Mathematics',''],['Algorithms',''],['Linear Algebra',''],['Probability','']],

    side: 'left',

/* ══════════════════════════════════════════
   BUILD PLANT GEOMETRY
   Stem is an S-curve from bottom-center upward.
   We sample it into STEM array and place
   each milestone at its p-fraction point.
══════════════════════════════════════════ */
function stemPoint(t) {
  // Stem goes from bottom-center (W*0.42, H*0.92)
  // to top-center (W*0.5, H*0.08)
  // with a gentle S-curve (two control points)
  const x0 = W*0.42,  y0 = H*0.92;
  const cx1 = W*0.35, cy1 = H*0.65;
  const cx2 = W*0.55, cy2 = H*0.35;
  const x3 = W*0.50,  y3 = H*0.08;
  const mt = 1-t;
  return {
    x: mt*mt*mt*x0 + 3*mt*mt*t*cx1 + 3*mt*t*t*cx2 + t*t*t*x3,
    y: mt*mt*mt*y0 + 3*mt*mt*t*cy1 + 3*mt*t*t*cy2 + t*t*t*y3,
  };
}

function stemTangent(t) {
  const x0=W*0.42, y0=H*0.92, cx1=W*0.35, cy1=H*0.65,
        cx2=W*0.55, cy2=H*0.35, x3=W*0.50, y3=H*0.08;
  const mt=1-t;
  return {
    x: 3*(mt*mt*(cx1-x0)+2*mt*t*(cx2-cx1)+t*t*(x3-cx2)),
    y: 3*(mt*mt*(cy1-y0)+2*mt*t*(cy2-cy1)+t*t*(y3-cy2)),
  };
}

function buildPlantDefs() {
  // Sample stem into 200 points
  STEM = [];
  for (let i=0; i<=200; i++) STEM.push(stemPoint(i/200));

  // Place each milestone at its p-point on the stem
  NODES = MILESTONES.map(m => {
    const pt  = stemPoint(m.p);
    const tan = stemTangent(m.p);
    // normal vector (perpendicular to tangent)
    const len = Math.sqrt(tan.x*tan.x + tan.y*tan.y);
    const nx  = -tan.y / len;
    const ny  =  tan.x / len;
    return { ...m, pt, nx, ny, tan };
  });
}

/* ══════════════════════════════════════════
   LABEL DOM CREATION
══════════════════════════════════════════ */
const labelsDiv = document.getElementById('labels');
let labelEls = {};
const careerRuler = document.getElementById('career-ruler');
const careerStartYear = 2015;
const careerCurrentYear = new Date().getFullYear();
const careerSegments = [
  { id: 'mit', label: 'MIT', start: 2015, end: 2019 },
  { id: 'weill', label: 'Weill Cornell', start: 2019, end: 2021 },
  { id: 'bms', label: 'BMS', start: 2021, end: careerCurrentYear },
];

function careerYearPct(year) {
  const span = Math.max(1, careerCurrentYear - careerStartYear);
  return ((careerCurrentYear - year) / span) * 100;
}

function buildLabels() {
  labelsDiv.innerHTML = '';
  labelEls = {};
  NODES.forEach(n => {
    const div = document.createElement('div');
    div.className = `label ${n.side}`;
    div.id = `lbl-${n.id}`;
    let inner = '';
    if (n.year)  inner += `<div class="label-year">${n.year}</div>`;
    inner += `<div class="label-title">${n.title}</div>`;
    if (n.org)   inner += `<div class="label-org">${n.org}</div>`;
    inner += `<div class="label-desc">${n.desc}</div>`;
    if (n.tags && n.tags.length) {
      inner += `<div class="label-tags">${n.tags.map(([t,c])=>`<span class="label-tag ${c}">${t}</span>`).join('')}</div>`;
    }
    if (n.pub) {
      inner += `<a class="label-pub" href="${n.pub.href}" target="_blank" rel="noopener">↗ ${n.pub.text}</a>`;
    }
    div.innerHTML = inner;
    labelsDiv.appendChild(div);
    labelEls[n.id] = div;
  });
}

function buildCareerRuler() {
  if (!careerRuler) return;

  const stemTop = stemPoint(1).y;
  const stemBottom = stemPoint(0).y;
  careerRuler.style.top = stemTop + 'px';
  careerRuler.style.height = (stemBottom - stemTop) + 'px';

  let html = '<div class="ruler-line"><div class="ruler-progress">';
  careerSegments.forEach(segment => {
    const top = careerYearPct(segment.end);
    const bottom = careerYearPct(segment.start);
    html += `<span class="ruler-segment ${segment.id}" style="top:${top}%;height:${bottom - top}%;"></span>`;
  });
  html += '</div></div>';

  for (let q = careerStartYear * 4; q <= careerCurrentYear * 4; q++) {
    const value = q / 4;
    const top = careerYearPct(value);
    const tickClass = q % 4 === 0 ? 'major' : q % 2 === 0 ? 'half' : 'quarter';
    html += `<span class="ruler-tick ${tickClass}" style="top:${top}%;"></span>`;
    if (q % 4 === 0) {
      html += `<span class="ruler-year" style="top:${top}%;">${value}</span>`;
    }
  }

  const boundaryNodes = [
    { year: 2015, cls: 'mit' },
    { year: 2019, cls: 'weill' },
    { year: 2021, cls: 'bms' },
    { year: careerCurrentYear, cls: 'bms now' },
  ];
  boundaryNodes.forEach(node => {
    html += `<span class="ruler-node ${node.cls}" style="top:${careerYearPct(node.year)}%;"></span>`;
  });

  careerSegments.forEach(segment => {
    const top = (careerYearPct(segment.start) + careerYearPct(segment.end)) / 2;
    html += `<span class="ruler-place ${segment.id}" style="top:${top}%;">${segment.label}</span>`;
  });

  careerRuler.innerHTML = html;
}

function positionLabels() {
  NODES.forEach(n => {
    const el = labelEls[n.id];
    if (!el) return;
    const OFFSET = 52;
    let lx = n.pt.x + (n.side === 'right' ? OFFSET : -OFFSET);
    let ly = n.pt.y;
    if (n.side === 'right') {
      el.style.left  = lx + 'px';
      el.style.right = 'auto';
    } else {
      el.style.right = (W - lx) + 'px';
      el.style.left  = 'auto';
    }
    el.style.top = (ly - 20) + 'px';
  });
}

/* ══════════════════════════════════════════
   DRAW
══════════════════════════════════════════ */
let progress = 0; // 0→1

function draw(p) {
  const c = themeColors();
  ctx.clearRect(0,0,W,H);

  // Background
  const bgGrad = ctx.createLinearGradient(0, H, 0, 0);
  const isDark = currentTheme.startsWith('dark');
  if (isDark) {
    bgGrad.addColorStop(0,   '#050708');
    bgGrad.addColorStop(0.3, '#080c10');
    bgGrad.addColorStop(1,   '#0a0c14');
  } else {
    bgGrad.addColorStop(0,   '#e8e2d8');
    bgGrad.addColorStop(0.3, '#f0ece4');
    bgGrad.addColorStop(1,   '#fafaf8');
  }
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0,0,W,H);

  // Soil mound at bottom
  const soilColor = isDark ? '#1a1208' : '#c8b898';
  ctx.fillStyle = soilColor;
  ctx.beginPath();
  ctx.ellipse(W*0.42, H*0.94, W*0.18, H*0.04, 0, 0, Math.PI*2);
  ctx.fill();

  // Soil texture lines
  ctx.strokeStyle = isDark ? 'rgba(80,55,20,0.4)' : 'rgba(100,75,40,0.3)';
  ctx.lineWidth = 1;
  for (let i=0; i<5; i++) {
    const ox = (i-2)*18;
    ctx.beginPath();
    ctx.moveTo(W*0.42+ox, H*0.93);
    ctx.bezierCurveTo(W*0.42+ox-4, H*0.945, W*0.42+ox+4, H*0.955, W*0.42+ox, H*0.965);
    ctx.stroke();
  }

  if (p <= 0.001) {
    drawSeed(c, p);
    return;
  }

  // How far along the stem to draw
  const stemP = Math.min(1, p * 1.5); // stem draws faster than p so top reached at p~0.67

  // ── STEM ──
  const stemLen = Math.floor(stemP * STEM.length);
  if (stemLen > 1) {
    // Stem fill glow
    ctx.save();
    ctx.lineWidth = getThickness(0) * 2.5;
    ctx.strokeStyle = c.accent + '18';
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.filter = 'blur(6px)';
    ctx.beginPath();
    ctx.moveTo(STEM[0].x, STEM[0].y);
    for (let i=1; i<stemLen; i++) ctx.lineTo(STEM[i].x, STEM[i].y);
    ctx.stroke();
    ctx.filter = 'none';
    ctx.restore();

    // Stem main line — thickness varies (thin at base when young, thicker at BMS)
    // Draw in segments with varying width
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let i=1; i<stemLen; i++) {
      const t = i/STEM.length;
      ctx.lineWidth = getThickness(t);
      ctx.strokeStyle = stemColor(c, t, isDark);
      ctx.beginPath();
      ctx.moveTo(STEM[i-1].x, STEM[i-1].y);
      ctx.lineTo(STEM[i].x, STEM[i].y);
      ctx.stroke();
    }

    // Tip glow dot
    const tip = STEM[stemLen-1];
    ctx.save();
    ctx.shadowColor = c.accent;
    ctx.shadowBlur  = 12;
    ctx.fillStyle   = c.accent;
    ctx.beginPath();
    ctx.arc(tip.x, tip.y, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // ── SEED / SPROUT NEAR BASE ──
  drawSeed(c, p);

  // ── NODES + LEAVES ──
  NODES.forEach((n, i) => {
    if (p < n.p) return;
    const localP = Math.min(1, (p - n.p) / 0.06); // 0→1 over 6% of total scroll
    drawNode(n, localP, c, isDark, stemP);
  });
}

function getThickness(t) {
  // Thin (1.5px) at base, grows to 4px at BMS (p~0.66), stays thick above
  return 1.5 + Math.min(t / 0.66, 1) * 2.8;
}

function stemColor(c, t, isDark) {
  // Younger (lower t) = lighter/more yellow-green; older = richer sage
  if (isDark) {
    const g = Math.round(150 + t*60);
    const rb = Math.round(40 + t*30);
    return `rgba(${rb},${g},${rb*1.2},0.92)`;
  } else {
    const g = Math.round(120 + t*80);
    return `rgba(30,${g},60,0.88)`;
  }
}

function drawSeed(c, p) {
  const sx = W*0.42, sy = H*0.90;
  if (p < 0.005) {
    // Just a seed
    ctx.save();
    ctx.fillStyle = c.accent + 'cc';
    ctx.strokeStyle = c.accent;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(sx, sy, 6, 8, 0.3, 0, Math.PI*2);
    ctx.fill(); ctx.stroke();
    ctx.restore();
    return;
  }
  // Seed + small sprout loop
  const sproutH = Math.min(30, p * 300);
  ctx.save();
  ctx.strokeStyle = c.accent;
  ctx.lineWidth = 1.5;
  ctx.lineCap = 'round';
  // cotyledon leaves (two small rounded leaves at base)
  const lp = Math.min(1, p*8);
  ctx.fillStyle = c.accent + Math.round(lp*220).toString(16).padStart(2,'0');
  ctx.strokeStyle = c.accent;
  // left cotyledon
  ctx.save();
  ctx.translate(sx-2, sy-2);
  ctx.rotate(-0.5);
  ctx.scale(lp, lp);
  ctx.beginPath();
  ctx.ellipse(-6, 0, 8, 4, -0.3, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.restore();
  // right cotyledon
  ctx.save();
  ctx.translate(sx+2, sy-2);
  ctx.rotate(0.5);
  ctx.scale(lp, lp);
  ctx.beginPath();
  ctx.ellipse(6, 0, 8, 4, 0.3, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.restore();
  ctx.restore();
}

function drawNode(n, localP, c, isDark, stemP) {
  const pt = n.pt;
  // Don't draw if stem hasn't reached this point yet
  if (n.p > stemP) return;

  // Node dot on stem
  ctx.save();
  const dotR = n.type === 'joint' ? 5 : 3.5;
  ctx.shadowColor = n.type === 'joint' ? c.accent : c.accent + '88';
  ctx.shadowBlur  = n.type === 'joint' ? 10 : 6;
  ctx.fillStyle   = c.accent;
  ctx.strokeStyle = isDark ? '#0a0c0f' : '#fafaf8';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.arc(pt.x, pt.y, dotR * localP, 0, Math.PI*2);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // Connector line from stem to label
  const OFFSET = 44;
  const ex = pt.x + (n.side === 'right' ? OFFSET : -OFFSET);
  ctx.save();
  ctx.globalAlpha = localP * 0.55;
  ctx.strokeStyle = c.accent;
  ctx.lineWidth   = 0.8;
  ctx.setLineDash([3,4]);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(pt.x, pt.y);
  ctx.lineTo(ex, pt.y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Leaf shape for leaf/branch types
  if (n.type === 'leaf' || n.type === 'branch') {
    drawLeaf(pt, n.side, localP, c, n.type === 'branch');
  }

  // Joint ring for joint types
  if (n.type === 'joint') {
    ctx.save();
    ctx.globalAlpha = localP * 0.25;
    ctx.strokeStyle = c.accent;
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 12 * localP, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = localP * 0.1;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, 20 * localP, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // Show/hide label
  const el = labelEls[n.id];
  if (el) {
    if (localP > 0.4) el.classList.add('visible');
    else              el.classList.remove('visible');
  }
}

function drawLeaf(pt, side, p, c, isBranch) {
  const dir = side === 'right' ? 1 : -1;
  const lw  = isBranch ? 38 : 28;
  const lh  = isBranch ? 16 : 11;
  const angle = side === 'right' ? -0.4 : 0.4;

  ctx.save();
  ctx.translate(pt.x + dir*14*p, pt.y - 6*p);
  ctx.rotate(angle);
  ctx.scale(p, p);

  // leaf fill
  ctx.fillStyle = c.accent + '55';
  ctx.strokeStyle = c.accent;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(dir*lw*0.5, -lh*1.2, dir*lw, 0);
  ctx.quadraticCurveTo(dir*lw*0.5,  lh*0.8,  0, 0);
  ctx.fill(); ctx.stroke();

  // leaf vein
  ctx.strokeStyle = c.accent + 'aa';
  ctx.lineWidth = 0.6;
  ctx.beginPath();
  ctx.moveTo(0,0);
  ctx.lineTo(dir*lw*0.85, 0);
  ctx.stroke();
  // secondary veins
  for (let i=1; i<=3; i++) {
    const vx = dir*lw*i*0.22;
    ctx.beginPath();
    ctx.moveTo(vx, 0);
    ctx.lineTo(vx + dir*6, -lh*0.55);
    ctx.stroke();
  }

  ctx.restore();
}

/* ══════════════════════════════════════════
   SCROLL HANDLER
══════════════════════════════════════════ */
const driver = document.getElementById('scroll-driver');
const progressBar = document.getElementById('progress-bar');
const scrollHint  = document.getElementById('scroll-hint');
const doneCta     = document.getElementById('done-cta');

function onScroll() {
  const scrollTop = window.scrollY || window.pageYOffset || 0;
  const maxScroll = Math.max(1, driver.offsetHeight - window.innerHeight);
  progress = Math.max(0, Math.min(1, scrollTop / maxScroll));

  progressBar.style.width = (progress * 100) + '%';
  const rulerProgress = document.querySelector('.ruler-progress');
  if (rulerProgress) {
    const rulerFill = Math.min(1, progress * 1.5) * 100;
    rulerProgress.style.clipPath = `inset(${100 - rulerFill}% 0 0 0)`;
  }

  if (progress > 0.03) scrollHint.classList.add('hidden');
  else                 scrollHint.classList.remove('hidden');

  if (progress > 0.96) doneCta.classList.add('visible');
  else                 doneCta.classList.remove('visible');

  draw(progress);
}

window.addEventListener('scroll', onScroll, { passive: true });

/* ══════════════════════════════════════════
   INIT + LOOP
══════════════════════════════════════════ */
bgDirty = false;
let raf;

function tick() {
  if (bgDirty) { draw(progress); bgDirty = false; }
  raf = requestAnimationFrame(tick);
}

window.addEventListener('load', () => {
  resize();
  buildLabels();
  positionLabels();
  window.scrollTo(0, 0);
  progress = 0;
  draw(0);
  tick();
  onScroll();
});

window.addEventListener('DOMContentLoaded', () => {
  resize();
  buildLabels();
  positionLabels();
  draw(0);
});
</script>
