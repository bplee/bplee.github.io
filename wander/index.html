<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owl & Mouse</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
html<script async src="https://www.googletagmanager.com/gtag/js?id=G-J1GZP6P1RD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-J1GZP6P1RD');
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0a0c0f;
  cursor: pointer;
  user-select: none;
  font-family: 'Space Mono', monospace;
}
#scene {
  width: 100vw;
  height: 100vh;
  position: relative;
}
#bg-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ── DIALOGUE FEED ── */
#dialogue-feed {
  position: absolute;
  bottom: 64px;
  left: 0;
  right: 0;
  padding: 0 5vw;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
  z-index: 5;
}

.bubble-row {
  display: flex;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.bubble-row.owl-row  { justify-content: flex-start; }
.bubble-row.mouse-row { justify-content: flex-end; }
.bubble-row.visible  { opacity: 1; transform: translateY(0); }

.bubble {
  max-width: min(420px, 72vw);
  background: rgba(30, 34, 44, 0.5);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px 16px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.owl-row .bubble  { border-radius: 4px 12px 12px 12px; }
.mouse-row .bubble { border-radius: 12px 4px 12px 12px; }

.bubble-speaker {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 5px;
  opacity: 0.7;
}
.owl-row  .bubble-speaker { color: #c8b87a; }
.mouse-row .bubble-speaker { color: #7ebe9a; }

.bubble-text {
  font-size: 13px;
  line-height: 1.65;
  color: #cdd3de;
  min-height: 1.65em;
  font-family: 'Space Mono', monospace;
}

/* ── CURSOR blink ── */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: rgba(200,200,200,0.7);
  vertical-align: text-bottom;
  margin-left: 1px;
  animation: blink 0.75s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── HINT ── */
#hint {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.2);
  opacity: 0;
  transition: opacity 0.4s ease;
  z-index: 6;
  pointer-events: none;
}
#hint.visible { opacity: 1; }

/* ── FINAL BUTTON ── */
#final-prompt {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  display: none;
  opacity: 0;
  transition: opacity 0.8s ease;
  z-index: 6;
}
#final-btn {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: #7ebe9a;
  border: 0.5px solid rgba(126,190,154,0.55);
  background: rgba(30,34,44,0.5);
  backdrop-filter: blur(6px);
  padding: 10px 28px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
}
#final-btn:hover { background: rgba(126,190,154,0.1); border-color: #7ebe9a; }

/* ── CLICK OVERLAY ── */
#click-overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
}
</style>
</head>
<body>
<div id="scene">
  <canvas id="bg-canvas"></canvas>
  <div id="dialogue-feed"></div>
  <div id="hint">click to continue</div>
  <div id="final-prompt">
    <button id="final-btn">wander →</button>
  </div>
  <div id="click-overlay"></div>
</div>

<script>
/* ══════════════════════════════════════════
   SCENE DRAWING
══════════════════════════════════════════ */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  drawScene();
}
window.addEventListener('resize', resize);

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  /* sky */
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#060810');
  sky.addColorStop(0.6, '#0d1220');
  sky.addColorStop(1, '#151a28');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  /* stars */
  const starData = [
    [0.08,0.06],[0.18,0.12],[0.32,0.04],[0.45,0.09],[0.6,0.03],
    [0.72,0.14],[0.85,0.07],[0.92,0.11],[0.14,0.22],[0.55,0.18],
    [0.78,0.19],[0.4,0.25],[0.25,0.08],[0.67,0.23],[0.95,0.05],
    [0.03,0.18],[0.5,0.28],[0.88,0.28],[0.35,0.15],[0.7,0.06],
  ];
  starData.forEach(([sx, sy], i) => {
    ctx.beginPath();
    ctx.arc(sx*W, sy*H, 0.7+(i%3)*0.4, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.3+(i%4)*0.15})`;
    ctx.fill();
  });

  /* moon */
  const mx = W*0.82, my = H*0.14, mr = H*0.055;
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, Math.PI*2);
  ctx.fillStyle = '#d8dfc8'; ctx.fill();
  ctx.beginPath(); ctx.arc(mx+mr*0.3, my-mr*0.1, mr*0.88, 0, Math.PI*2);
  ctx.fillStyle = '#0d1220'; ctx.fill();

  /* ground */
  const ground = ctx.createLinearGradient(0, H*0.78, 0, H);
  ground.addColorStop(0, '#1a2010'); ground.addColorStop(1, '#0f1408');
  ctx.fillStyle = ground;
  ctx.beginPath();
  ctx.moveTo(0, H*0.82);
  ctx.lineTo(W*0.12, H*0.80); ctx.lineTo(W*0.28, H*0.785);
  ctx.lineTo(W*0.5, H*0.79);  ctx.lineTo(W*0.75, H*0.78);
  ctx.lineTo(W, H*0.80); ctx.lineTo(W,H); ctx.lineTo(0,H);
  ctx.closePath(); ctx.fill();

  /* grass */
  ctx.strokeStyle = 'rgba(80,110,50,0.45)'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H*0.82);
  ctx.bezierCurveTo(W*0.25, H*0.785, W*0.5, H*0.795, W, H*0.80);
  ctx.stroke();

  /* tree */
  const tx = W*0.42, ty = H*0.79;
  ctx.strokeStyle='rgba(160,140,100,0.65)'; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(tx,ty);
  ctx.bezierCurveTo(tx-4,ty-H*0.18,tx+6,ty-H*0.32,tx,ty-H*0.42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx-2,ty-H*0.28);
  ctx.bezierCurveTo(tx-30,ty-H*0.32,tx-55,ty-H*0.30,tx-70,ty-H*0.26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx+3,ty-H*0.35);
  ctx.bezierCurveTo(tx+25,ty-H*0.40,tx+48,ty-H*0.38,tx+60,ty-H*0.34); ctx.stroke();

  drawOwl(W, H);
  drawMouse(W, H);
}

function drawOwl(W, H) {
  const cx = W*0.42, baseY = H*0.79, s = H*0.0022;
  ctx.save(); ctx.translate(cx, baseY);
  ctx.lineCap='round'; ctx.lineJoin='round';
  const ss = (a,w) => { ctx.strokeStyle=`rgba(210,200,175,${a})`; ctx.lineWidth=w||1.5; };

  ss(0.8); ctx.beginPath(); ctx.ellipse(0,-90*s,32*s,72*s,0,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(170,160,130,0.4)'; ctx.lineWidth=0.8;
  for(let i=0;i<5;i++){ ctx.beginPath(); ctx.moveTo((-18+i*7)*s,-60*s); ctx.bezierCurveTo((-22+i*7)*s,-50*s,(-20+i*7)*s,-40*s,(-16+i*7)*s,-30*s); ctx.stroke(); }

  ss(0.75);
  ctx.beginPath(); ctx.moveTo(-30*s,-100*s); ctx.bezierCurveTo(-60*s,-90*s,-70*s,-60*s,-55*s,-30*s); ctx.bezierCurveTo(-48*s,-20*s,-38*s,-25*s,-32*s,-40*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(30*s,-100*s);  ctx.bezierCurveTo(60*s,-90*s,70*s,-60*s,55*s,-30*s);  ctx.bezierCurveTo(48*s,-20*s,38*s,-25*s,32*s,-40*s);  ctx.stroke();

  ss(0.88); ctx.beginPath(); ctx.ellipse(0,-155*s,28*s,26*s,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-14*s,-176*s); ctx.bezierCurveTo(-18*s,-192*s,-12*s,-200*s,-8*s,-188*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(14*s,-176*s);  ctx.bezierCurveTo(18*s,-192*s,12*s,-200*s,8*s,-188*s);   ctx.stroke();
  ctx.strokeStyle='rgba(180,170,140,0.45)'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.ellipse(0,-155*s,20*s,18*s,0,0,Math.PI*2); ctx.stroke();

  ss(0.92,1.2);
  ctx.beginPath(); ctx.arc(-9*s,-158*s,7*s,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(9*s,-158*s,7*s,0,Math.PI*2);  ctx.stroke();
  ctx.fillStyle='rgba(15,15,10,0.95)';
  ctx.beginPath(); ctx.arc(-9*s,-158*s,4*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9*s,-158*s,4*s,0,Math.PI*2);  ctx.fill();
  ctx.fillStyle='rgba(255,255,240,0.85)';
  ctx.beginPath(); ctx.arc(-7*s,-161*s,1.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(11*s,-161*s,1.5*s,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='rgba(200,178,95,0.8)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(-4*s,-148*s); ctx.bezierCurveTo(-5*s,-142*s,0,-138*s,4*s,-142*s); ctx.bezierCurveTo(5*s,-147*s,2*s,-149*s,-4*s,-148*s); ctx.stroke();

  ctx.strokeStyle='rgba(180,158,95,0.65)'; ctx.lineWidth=1;
  [-14*s,14*s].forEach(fx => {
    const py=-18*s;
    ctx.beginPath(); ctx.moveTo(fx,py); ctx.lineTo(fx-8*s,py+10*s);
    ctx.moveTo(fx,py); ctx.lineTo(fx,py+12*s);
    ctx.moveTo(fx,py); ctx.lineTo(fx+8*s,py+10*s); ctx.stroke();
  });
  ctx.restore();
}

function drawMouse(W, H) {
  const cx = W*0.52, baseY = H*0.79, s = H*0.0012;
  ctx.save(); ctx.translate(cx, baseY);
  ctx.lineCap='round'; ctx.lineJoin='round';
  const ss = (a,w) => { ctx.strokeStyle=`rgba(200,185,170,${a})`; ctx.lineWidth=w||1.2; };

  ss(0.8); ctx.beginPath(); ctx.ellipse(0,-18*s,14*s,18*s,0.15,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(2*s,-40*s,12*s,11*s,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(-6*s,-50*s,6*s,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(8*s,-52*s,6*s,0,Math.PI*2);  ctx.stroke();
  ctx.strokeStyle='rgba(200,135,140,0.38)'; ctx.lineWidth=0.7;
  ctx.beginPath(); ctx.arc(-6*s,-50*s,3.5*s,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(8*s,-52*s,3.5*s,0,Math.PI*2);  ctx.stroke();

  ss(0.85,1.1);
  ctx.beginPath(); ctx.arc(7*s,-42*s,3*s,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(15,12,12,0.92)'; ctx.beginPath(); ctx.arc(7*s,-42*s,1.8*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,240,0.82)'; ctx.beginPath(); ctx.arc(8*s,-43*s,0.8*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(200,135,140,0.55)'; ctx.beginPath(); ctx.arc(13*s,-39*s,1.5*s,0,Math.PI*2); ctx.fill();

  ctx.strokeStyle='rgba(220,210,200,0.45)'; ctx.lineWidth=0.6;
  [[13,-38,28,-36],[13,-40,28,-40],[13,-42,28,-45]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1*s,y1*s); ctx.lineTo(x2*s,y2*s); ctx.stroke();
  });

  ctx.strokeStyle='rgba(185,165,150,0.55)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-12*s,-10*s); ctx.bezierCurveTo(-30*s,-5*s,-38*s,5*s,-28*s,12*s); ctx.stroke();

  ctx.strokeStyle='rgba(200,172,152,0.65)'; ctx.lineWidth=1;
  [[-6,0,-10,6],[-6,0,-2,6],[6,0,2,6],[6,0,10,6]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1*s,y1*s); ctx.lineTo(x2*s,y2*s); ctx.stroke();
  });
  ctx.restore();
}

resize();

/* ══════════════════════════════════════════
   DIALOGUE
══════════════════════════════════════════ */
const LINES = [
  { speaker: 'Owl',   side: 'owl',   text: 'What do you want to do with your life?' },
  { speaker: 'Mouse', side: 'mouse', text: "Oh… uh… I don't really know." },
  { speaker: 'Owl',   side: 'owl',   text: "Oh well, that's ok. But at the very least, you should just get out there." },
  { speaker: 'Mouse', side: 'mouse', text: "Why's that? You gonna tell me there's something waiting for me?" },
  { speaker: 'Owl',   side: 'owl',   text: "No. I wouldn't lie to you. Quite honestly, there's nothing waiting for you." },
  { speaker: 'Mouse', side: 'mouse', text: "…" },
  { speaker: 'Owl',   side: 'owl',   text: "It doesn't matter where you are, it doesn't matter what you're doing-- you only need to be somewhere doing something. You'll only find yourself if you wander in the woods." },
];

const feed        = document.getElementById('dialogue-feed');
const hintEl      = document.getElementById('hint');
const finalPrompt = document.getElementById('final-prompt');
const overlay     = document.getElementById('click-overlay');

let current = 0, typing = false, typeTimer = null;
let activeBubbleText = null, activeCursor = null;

function createBubble(line) {
  const row = document.createElement('div');
  row.className = `bubble-row ${line.side}-row`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  const spk = document.createElement('div');
  spk.className = 'bubble-speaker';
  spk.textContent = line.speaker;

  const txt = document.createElement('div');
  txt.className = 'bubble-text';

  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  bubble.appendChild(spk);
  bubble.appendChild(txt);
  row.appendChild(bubble);
  feed.appendChild(row);

  /* animate in */
  requestAnimationFrame(() => requestAnimationFrame(() => row.classList.add('visible')));

  return { txt, cursor };
}

function typeText(txt, cursor, text, onDone) {
  typing = true;
  activeBubbleText = txt;
  activeCursor = cursor;
  txt.textContent = '';
  txt.appendChild(cursor);
  let i = 0;
  hintEl.classList.remove('visible');

  function tick() {
    if (i < text.length) {
      txt.insertBefore(document.createTextNode(text[i++]), cursor);
      typeTimer = setTimeout(tick, 28);
    } else {
      cursor.remove();
      typing = false;
      onDone();
    }
  }
  tick();
}

function showLine(idx) {
  const line = LINES[idx];
  const { txt, cursor } = createBubble(line);
  typeText(txt, cursor, line.text, () => hintEl.classList.add('visible'));
}

function skipTyping() {
  clearTimeout(typeTimer);
  typing = false;
  if (activeCursor) activeCursor.remove();
  if (activeBubbleText) {
    activeBubbleText.textContent = LINES[current].text;
  }
  hintEl.classList.add('visible');
}

function advance() {
  if (typing) { skipTyping(); return; }
  current++;
  hintEl.classList.remove('visible');
  if (current >= LINES.length) {
    finishDialogue();
  } else {
    showLine(current);
  }
}

function finishDialogue() {
  overlay.style.pointerEvents = 'none';
  hintEl.classList.remove('visible');
  finalPrompt.style.display = 'block';
  requestAnimationFrame(() => finalPrompt.style.opacity = '1');
}

overlay.addEventListener('click', advance);
document.getElementById('final-btn').addEventListener('click', () => {
  window.location.href = '../wander/world.html';
});

/* star twinkle */
let t = 0;
const twinkleStars = [[0.08,0.06],[0.18,0.12],[0.32,0.04],[0.45,0.09],[0.6,0.03],[0.72,0.14],[0.85,0.07],[0.92,0.11]];
(function twinkle() {
  t += 0.012;
  const W = canvas.width, H = canvas.height;
  twinkleStars.forEach(([sx,sy],i) => {
    const x=sx*W, y=sy*H;
    ctx.clearRect(x-3,y-3,6,6);
    ctx.beginPath(); ctx.arc(x,y,0.5+0.7*Math.abs(Math.sin(t+i*1.4)),0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${0.25+0.45*Math.abs(Math.sin(t+i*1.4))})`;
    ctx.fill();
  });
  requestAnimationFrame(twinkle);
})();

showLine(0);
</script>
</body>
</html>
