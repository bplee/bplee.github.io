<script>
/* Theme switcher: copied from homepage for full panel parity */
var currentTheme = localStorage.getItem('bl-theme') || 'dark-expressive';

function setTheme(theme, optionEl) {
  currentTheme = theme;
  document.body.setAttribute('data-theme', theme);
  localStorage.setItem('bl-theme', theme);
  document.querySelectorAll('.theme-option').forEach(function(el) {
    el.classList.toggle('active', el.getAttribute('data-theme') === theme);
  });
  closePanel();
}

function togglePanel() {
  var el = document.getElementById('themePanel');
  if (el) el.classList.toggle('open');
}
function closePanel() {
  var el = document.getElementById('themePanel');
  if (el) el.classList.remove('open');
}

var themeBtnEl = document.getElementById('themeBtn');
if (themeBtnEl) {
  themeBtnEl.addEventListener('click', function(e) {
    e.stopPropagation();
    togglePanel();
  });
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.theme-switcher')) closePanel();
});

// restore saved theme and mark active option
if (currentTheme !== 'dark-expressive') {
  setTheme(currentTheme, null);
}
</script>
